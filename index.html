<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Калькулятор здоровья</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1>Калькулятор здоровья</h1>
        <p>
          Быстро заполните поля и получите оценку состояния: ИМТ, базовый обмен,
          ориентировочную норму калорий и итоговый health score.
        </p>
      </header>

      <form id="health-form" class="card form" novalidate>
        <div class="form__grid">
          <label class="field">
            <span>Пол</span>
            <select id="sex" name="sex" required>
              <option value="female">Женский</option>
              <option value="male">Мужской</option>
            </select>
          </label>

          <label class="field">
            <span>Возраст (лет)</span>
            <input id="age" name="age" type="number" min="14" max="100" required placeholder="30" />
          </label>

          <label class="field">
            <span>Рост (см)</span>
            <input id="height" name="height" type="number" min="120" max="230" required placeholder="175" />
          </label>

          <label class="field">
            <span>Вес (кг)</span>
            <input id="weight" name="weight" type="number" min="35" max="250" step="0.1" required placeholder="72.5" />
          </label>

          <label class="field">
            <span>Талия (см)</span>
            <input id="waist" name="waist" type="number" min="45" max="180" step="0.1" required placeholder="82" />
          </label>

          <label class="field">
            <span>Активность</span>
            <select id="activity" name="activity" required>
              <option value="1.2">Низкая (сидячая работа)</option>
              <option value="1.375">Лёгкая (1–3 тренировки в неделю)</option>
              <option value="1.55">Средняя (3–5 тренировок)</option>
              <option value="1.725">Высокая (6–7 тренировок)</option>
              <option value="1.9">Очень высокая (спорт/физический труд)</option>
            </select>
          </label>
        </div>

        <div class="form__actions">
          <button type="submit" class="btn btn--primary">Рассчитать</button>
          <button type="button" id="fill-demo" class="btn btn--ghost">Заполнить пример</button>
          <button type="reset" class="btn btn--ghost">Очистить</button>
        </div>

        <p id="error" class="error" role="alert" aria-live="polite"></p>
      </form>

      <section id="result" class="card result" aria-live="polite" hidden>
        <h2>Результат</h2>
        <div class="metrics">
          <article class="metric">
            <h3>ИМТ</h3>
            <p id="bmi-value" class="metric__value"></p>
            <p id="bmi-text" class="metric__text"></p>
          </article>
          <article class="metric">
            <h3>Базовый обмен</h3>
            <p id="bmr-value" class="metric__value"></p>
            <p class="metric__text">ккал в сутки в покое</p>
          </article>
          <article class="metric">
            <h3>Поддержание веса</h3>
            <p id="tdee-value" class="metric__value"></p>
            <p class="metric__text">ккал в сутки с учётом активности</p>
          </article>
          <article class="metric metric--score">
            <h3>Health score</h3>
            <p id="score-value" class="metric__value"></p>
            <p id="score-text" class="metric__text"></p>
          </article>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
